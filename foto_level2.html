<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Level 2</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at top, #1b0011, #000);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px;
            gap: 60px;
        }

        .left {
            width: 45%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 64px;
            color: #ff007f;
            margin-bottom: 40px;

            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 1s ease forwards;
        }

        .story {
            display: flex;
            flex-direction: column;
            gap: 25px;
            min-height: 300px;
        }

        .line {
            font-size: 17px;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s;
        }

        .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        .hint {
            margin-bottom: 50px;
            color: gray;
            font-size: 15px;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
        }

        .button {
            margin-bottom: 60px;
            width: fit-content;
            padding: 16px 34px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            background: #ff007f;
            color: white;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
        }

        .button.show {
            opacity: 1;
            pointer-events: auto;
        }

        .button:hover {
            transform: scale(1.05);
            background: #ff2a95;
            box-shadow: 0 0 20px #ff007f;
        }

        .right {
            width: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .right img {
            width: 100%;
            max-width: 520px;
            border-radius: 24px;
            box-shadow:
                0 0 0 5px #ff007f,
                0 20px 50px rgba(0, 0, 0, 0.8);

            opacity: 0;
            transform: scale(0.9);
            animation: imageShow 1.5s ease forwards;
            animation-delay: 0.4s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes imageShow {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">

            <h1>Level 2</h1>

            <div class="story">

                <div class="line show">
                    The second level is complete...
                </div>

                <div class="line">
                    But what do we really know about Mickey?
                </div>

                <div class="line">
                    Mickey:
                </div>

                <div class="line">
                    “My dear son... my own son...
                    I am your father.”
                </div>

                <div class="line">
                    “After all these years...
                    I still can’t believe it’s truly you.”
                </div>

            </div>

            <div class="hint">
                Press SPACE to continue
            </div>

            <button class="button"
                onclick="window.location.href='level3.html'">
                Next Level
            </button>

        </div>

        <div class="right">
            <img src="Images/foto_level2.png" alt="Foto level 2">
        </div>

    </div>

    <script>
        const lines = document.querySelectorAll(".line");
        const button = document.querySelector(".button");

        let current = 1;

        document.addEventListener("keydown", (e) => {

            if (e.code === "Space") {

                e.preventDefault();

                if (current < lines.length) {

                    lines[current].classList.add("show");
                    current++;

                } else {

                    button.classList.add("show");
                }
            }
        });
    </script>

</body>

</html>
