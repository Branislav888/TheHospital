<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>The Hospital - Level 1</title>
<link rel="stylesheet" href="level1.css">
</head>

<body>

<div id="game">
    <img id="player" src="Images/human4.png">

    <img class="chair" src="Images/chair.png">
    <img class="chair" src="Images/chair.png">
    <img class="chair" src="Images/chair.png">
    <img class="chair" src="Images/chair.png">
    <img class="chair" src="Images/chair.png">

    <img id="chairBoost" src="Images/chair.png">

    <img id="door" src="Images/door.png">
</div>

<script>
const player = document.getElementById("player");
const chairs = document.querySelectorAll(".chair");
const chairBoost = document.getElementById("chairBoost");
const door = document.getElementById("door");

const framesRight = [
    "Images/human1.png",
    "Images/human5.png",
    "Images/human3.png"
];

const framesLeft = [
    "Images/human2.png",
    "Images/human6.png",
    "Images/human7.png"
];

let frameIndexRight = 0;
let frameIndexLeft = 0;
let animCooldown = 0;

let x = 100;
let y = 0;
let vy = 0;

const gravity = 0.5;
const jumpPower = 15;
const boostPower = 18;
const moveSpeed = 6;

let onGround = false;
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

const PW = 60;
const PH = 100;

const platforms = [
    { baseX: 300, baseY: 450, amp: 60, speed: 0.02 },
    { baseX: 600, baseY: 400, amp: 80, speed: 0.03 },
    { baseX: 900, baseY: 450, amp: 50, speed: 0.025 },
    { baseX: 1200, baseY: 400, amp: 70, speed: 0.02 },
    { baseX: 1500, baseY: 350, amp: 90, speed: 0.015 }
];

const boostPlatform = {
    baseX: 850,
    baseY: 0,
    vx: 0
};

function anim(src) {
    player.src = src;
}

let time = 0;

function update() {
    time++;

    if (keys["a"]) x -= moveSpeed;
    if (keys["d"]) x += moveSpeed;

    if (keys["w"] && onGround) {
        vy = jumpPower;
        onGround = false;
    }

    vy -= gravity;
    y += vy;

    if (y < 0) {
        y = 0;
        vy = 0;
        onGround = true;
    }

    const pLeft = x;
    const pRight = x + PW;
    const pBottom = y;
    const pTop = y + PH;

    let groundedThisFrame = false;

    chairs.forEach((chair, i) => {
        const p = platforms[i];

        const cx = p.baseX;
        const cy = p.baseY + Math.sin(time * p.speed) * p.amp;

        chair.style.left = cx + "px";
        chair.style.bottom = cy + "px";

        const cLeft = cx;
        const cRight = cx + 80;
        const cTop = cy + 100;

        const overlapX = pRight > cLeft && pLeft < cRight;

        const landing =
            vy <= 0 &&
            overlapX &&
            pBottom <= cTop &&
            pBottom - vy >= cTop;

        if (landing) {
            y = cTop;
            vy = 0;
            groundedThisFrame = true;
        }
    });

    const bLeft = boostPlatform.baseX;
    const bRight = bLeft + 80;
    const bTop = boostPlatform.baseY + 100;

    const overlapX = pRight > bLeft && pLeft < bRight;
    const overlapY = pBottom < bTop && pTop > boostPlatform.baseY;
    const touch = overlapX && overlapY;

    if (touch) {
        if (keys["a"]) boostPlatform.vx = -3;
        else if (keys["d"]) boostPlatform.vx = 3;
        else boostPlatform.vx *= 0.8;
    } else {
        boostPlatform.vx *= 0.95;
    }

    boostPlatform.baseX += boostPlatform.vx;

    if (touch) {
        if (x < bLeft) x = bLeft - PW;
        else if (x > bRight - PW) x = bRight;
    }

    chairBoost.style.left = boostPlatform.baseX + "px";
    chairBoost.style.bottom = boostPlatform.baseY + "px";

    const landingBoost =
        vy <= 0 &&
        overlapX &&
        pBottom <= bTop &&
        pBottom - vy >= bTop;

    if (landingBoost) {
        y = bTop;
        vy = boostPower;
        onGround = false;
    }

    if (groundedThisFrame) onGround = true;

    const dx = 20;
    const dy = 600;

    door.style.left = dx + "px";
    door.style.bottom = dy + "px";

    if (
        x < dx + 90 &&
        x + PW > dx &&
        y < dy + 120 &&
        y + PH > dy
    ) {
        alert("WIN!");
        x = 100;
        y = 0;
    }

    if (keys["a"] && keys["w"]) anim("Images/human6.png");
    else if (keys["d"] && keys["w"]) anim("Images/human1.png");
    else if (keys["w"]) anim("Images/human4.png");
    else if (keys["a"]) {
        if (animCooldown <= 0) {
            anim(framesLeft[frameIndexLeft]);
            frameIndexLeft = (frameIndexLeft + 1) % framesLeft.length;
            animCooldown = 6;
        } else animCooldown--;
    }
    else if (keys["d"]) {
        if (animCooldown <= 0) {
            anim(framesRight[frameIndexRight]);
            frameIndexRight = (frameIndexRight + 1) % framesRight.length;
            animCooldown = 6;
        } else animCooldown--;
    }
    else anim("Images/human4.png");

    player.style.left = x + "px";
    player.style.bottom = y + "px";

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
<style>
body {
    margin: 0;
    overflow: hidden;
    background-image: url("Images/bbcklvl1.png");
    background-size: cover;
}

canvas {
    display: block;
}

#game {
    position: relative;
    width: 2000px;
    height: 100vh;
}

#player {
    position: absolute;
    width: 70px;
}

.chair {
    position: absolute;
    width: 80px;
}

#door {
    position: absolute;
    width: 150px;
}
#chairBoost {
    position: absolute;
    width: 80px;
    filter: hue-rotate(180deg) brightness(1.3);
}
</style>
