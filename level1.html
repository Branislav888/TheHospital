<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Hospital - Level 1 (Full Animations)</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #051a1a 0%, #052a31 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace; overflow: hidden;
        }
        .game-container { background: #000000aa; border-radius: 32px; padding: 20px; box-shadow: 0 20px 35px rgba(0, 0, 0, 0.8); }
        #viewport {
            width: 1100px; height: 550px; position: relative; border-radius: 20px;
            box-shadow: 0 0 0 5px #00ffcc, 0 12px 28px black; overflow: hidden; background-color: #111;
        }
        canvas { display: block; }
        .info-panel {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 16px; background: #002020; padding: 12px 25px;
            border-radius: 60px; color: #00ffcc; border: 1px solid #00ffcc;
        }
        button { background: #00ffcc; border: none; color: #002020; font-weight: bold; padding: 10px 20px; border-radius: 60px; cursor: pointer; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="viewport">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="info-panel">
        <div>POUŽI TYRKYSOVÚ STOLIČKU NA VÝSKOK K DVERÁM</div>
        <button id="resetBtn">REŠTART (R)</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const resetBtn = document.getElementById("resetBtn");

canvas.width = 1100;
canvas.height = 550;

// --- NAČÍTANIE OBRÁZKOV ---
const images = {};
const imgSources = {
    bg: "Images/bbcklvl1.png",
    chair: "Images/chair.png",
    door: "Images/door.png",
    idle: "Images/human4.png",
    r1: "Images/human1.png", r2: "Images/human5.png", r3: "Images/human3.png",
    l1: "Images/human2.png", l2: "Images/human6.png", l3: "Images/human7.png"
};

Object.keys(imgSources).forEach(key => {
    images[key] = new Image();
    images[key].src = imgSources[key];
});

const framesRight = ["r1", "r2", "r3"];
const framesLeft = ["l1", "l2", "l3"];

// --- PARAMETRE HRÁČA ---
let player = {
    x: 100, y: 430, w: 65, h: 100,
    vx: 0, vy: 0,
    speed: 6, jumpPower: -16, gravity: 0.7, onGround: false,
    currentImg: "idle",
    animTimer: 0,
    frameIdx: 0
};

// --- PLATFORMY (Modré stoličky) ---
const platforms = [
    { baseX: 550, baseY: 300, w: 80, h: 90, amp: 60, speed: 0.02, offset: 0, curY: 300 },
    { baseX: 900, baseY: 220, w: 80, h: 90, amp: 80, speed: 0.03, offset: 2, curY: 220 },
    { baseX: 1250, baseY: 180, w: 80, h: 90, amp: 50, speed: 0.025, offset: 4, curY: 180 },
    { baseX: 1600, baseY: 250, w: 80, h: 90, amp: 70, speed: 0.02, offset: 1, curY: 250 }
];

let boostChair = { x: 350, y: 430, w: 80, h: 100, vx: 0 };
const door = { x: 1900, y: 70, w: 100, h: 170 };

let cameraX = 0;
let keys = {};
let time = 0;

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === 'r') reset();
});
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function reset() {
    player.x = 100; player.y = 430; player.vx = 0; player.vy = 0;
    boostChair.x = 350; boostChair.vx = 0;
}
resetBtn.onclick = reset;

function update() {
    time++;

    // --- POHYB ---
    if (keys["a"]) {
        player.vx = -player.speed;
    } else if (keys["d"]) {
        player.vx = player.speed;
    } else {
        player.vx = 0;
    }

    if (keys["w"] && player.onGround) {
        player.vy = player.jumpPower;
        player.onGround = false;
    }

    player.vy += player.gravity;
    player.x += player.vx;
    player.y += player.vy;

    // --- KOLÍZIA ZEM ---
    if (player.y + player.h > 535) {
        player.y = 535 - player.h;
        player.vy = 0;
        player.onGround = true;
    }

    // --- ANIMÁCIE ---
    if (!player.onGround) {
        // Skok
        if (keys["a"]) player.currentImg = "l2"; 
        else if (keys["d"]) player.currentImg = "r1";
        else player.currentImg = "idle";
    } 
    else if (player.vx !== 0) {
        // Chôdza
        player.animTimer++;
        if (player.animTimer > 8) {
            player.frameIdx = (player.frameIdx + 1) % 3;
            player.currentImg = player.vx > 0 ? framesRight[player.frameIdx] : framesLeft[player.frameIdx];
            player.animTimer = 0;
        }
    } 
    else {
        // Stojí
        player.currentImg = "idle";
    }

    // --- BOOST CHAIR (Logika tlačení a skoku) ---
    let pMid = player.x + player.w/2;
    let bMid = boostChair.x + boostChair.w/2;

    if (player.x + player.w > boostChair.x && player.x < boostChair.x + boostChair.w &&
        player.y + player.h > boostChair.y + 10) {
        if (pMid < bMid) {
            boostChair.vx = 5;
            player.x = boostChair.x - player.w;
        } else {
            boostChair.vx = -5;
            player.x = boostChair.x + boostChair.w;
        }
    } else { boostChair.vx *= 0.85; }
    boostChair.x += boostChair.vx;

    // Super odraz
    if (player.vy > 0 && 
        player.x + player.w > boostChair.x && player.x < boostChair.x + boostChair.w &&
        player.y + player.h > boostChair.y && player.y + player.h < boostChair.y + 25) {
        player.y = boostChair.y - player.h;
        player.vy = -24; // Silný výskok
        player.onGround = false;
    }

    // --- LIETAJÚCE STOLIČKY ---
    platforms.forEach(p => {
        p.curY = p.baseY + Math.sin(time * p.speed + p.offset) * p.amp;
        if (player.vy >= 0 && 
            player.x + player.w - 15 > p.baseX && player.x + 15 < p.baseX + p.w &&
            player.y + player.h > p.curY && player.y + player.h < p.curY + 25) {
            player.y = p.curY - player.h;
            player.vy = 0;
            player.onGround = true;
        }
    });

    // --- KAMERA A HRANICE ---
    cameraX = player.x - 450;
    if (cameraX < 0) cameraX = 0;
    if (cameraX > 1100) cameraX = 1100;
    if (player.x < 0) player.x = 0;
    if (player.x > 2000) player.x = 2000;

    // VÝHRA
    if (player.x + player.w > door.x && player.x < door.x + door.w &&
        player.y + player.h > door.y && player.y < door.y + door.h) {
        alert("GRATULUJEM! LEVEL 1 DOKONČENÝ.");
        reset();
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Pozadie
    if (images.bg.complete) ctx.drawImage(images.bg, 0, 0, 2200, 550);

    // Dvere
    ctx.drawImage(images.door, door.x, door.y, door.w, door.h);

    // Modré lietajúce stoličky
    platforms.forEach(p => {
        ctx.drawImage(images.chair, p.baseX, p.curY, p.w, p.h);
    });

    // Boost stolička (Glow efekt)
    ctx.save();
    ctx.filter = "hue-rotate(165deg) brightness(1.6) drop-shadow(0 0 15px #00ffff)";
    ctx.drawImage(images.chair, boostChair.x, boostChair.y, boostChair.w, boostChair.h);
    ctx.restore();

    let imgKey = player.currentImg;
    if (images[imgKey] && images[imgKey].complete) {
        ctx.drawImage(images[imgKey], player.x, player.y, player.w, player.h);
    }

    ctx.restore();
}

window.onload = update;
</script>

</body>
</html>
